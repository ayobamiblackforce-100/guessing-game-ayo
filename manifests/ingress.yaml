apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: guessing-game-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: guessing-game.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: guessing-game-service
                port:
                  number: 8501

