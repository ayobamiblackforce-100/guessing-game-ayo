    steps:
      - uses: actions/checkout@v4
      
      - name: setup docker
        uses: docker/setup-docker-action@e43656e248c0bd0647d3f5c195d116aacf6fcaf4
        
      - name: deploy app on prod server #${{ needs.Image-scan_DOCKER-SCOUT.outputs.image_tag }}
        run: |
          docker rmi -f $(docker images -aq) || true
          mkdir -p ~/.ssh
          echo ${{ secrets.SSH_KEY }} > ~/.ssh/prod_key
          chmod 600 ~/.ssh && chmod 600 ~/.ssh/prod_key
          ssh -i ~/.ssh/prod_key root@138.197.165.82 docker run -d -p 80:8501 --name guessing-game ayobamiblackforce/guessing-game-prod:d575d3d03778f88a10036d96ac0d97fccc2b0988
