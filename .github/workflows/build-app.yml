name: Upload Python Package

on:
  push: 
    branches: ['main']
  workflow_dispatch: 

# permissions:
#   contents: read

jobs:
  SAST-scan_SONARQUBE:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: SonarSource/sonarqube-scan-action@v7.0.0
        with:
          args: >
            -Dsonar.qualitygate.wait=false
            -Dsonar.projectKey=ayobamiblackforce-100_guessing-game-ayo 
            -Dsonar.organization=ayobamiblackforce-100
        env:
          SONAR_TOKEN: ${{ vars.SONARCLOUD }}            


  SCA-scan_PIP-AUDIT:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
          
      - name: Run dependency scan
        run: |
          pip install pip-audit
          pip-audit -r app/requirements.txt --output sca-report.txt || true
          
      - name: Display sca-report
        run: |
          echo "$(cat sca-report.txt)"

      - name: Run 2nd dependency scan with BANDIT
        run: |
          pip install bandit
          bandit -ll -ii -r app/requirements.txt -f json -o bandit-report.json || true

      - name: Upload PIP-AUDIT report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipaudit-report.txt
          path: sca-report.txt

      - name: Upload BANDIT report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report.json
          path: bandit-report.json

  Image-scan_DOCKER-SCOUT:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image_tag.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: setup docker
        uses: docker/setup-docker-action@e43656e248c0bd0647d3f5c195d116aacf6fcaf4

      - name: generate tag
        id: image_tag
        run: echo "value=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: build container image
        run: |
          docker build -t ayobamiblackforce/guessing-game-staging:${{ steps.image_tag.outputs.value }} .

      # - name: run container
      #   run: |
      #     docker run -d --name guessing-game ayobamiblackforce/guessing-game-staging:${{ steps.image_tag.outputs.value }}

      # - name: get container ip
      #   id: con_ip
      #   run: |
      #     echo "value=$(docker exec guessing-game hostname -i)" >> "$GITHUB_OUTPUT"

      # - name: check status
      #   run: |
      #     docker ps
      #     echo ${{ steps.con_ip.outputs.value }}
          
      - name: image scanning
        uses: snowcittysolutions/scout-action-dev@eb15de5b9247f4800f2c9ac4896bbddeff4defb5
        with:
          command: cves, quickview
          only-severities: critical, high
          exit-on: vulnerability
          sarif-file: spdx
          output: scout-report.spdx
          dockerhub-user: ayobamiblackforce
          dockerhub-password: ${{ vars.DOCKERHUB_TOKEN }}

      - name: Upload SCOUT report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scout-report.spdx
          path: scout-report.spdx


  DAST-scan_OWASP-ZAP:
    runs-on: ubuntu-latest
    needs: Image-scan_DOCKER-SCOUT
    steps:
      - uses: actions/checkout@v4

      - name: run container
        run: |
          echo ${{ needs.Image-scan_DOCKER-SCOUT.outputs.image_tag.value }}
          docker run -d -p 8501:8501 --name guessing-game ayobamiblackforce/guessing-game-staging:${{ needs.Image-scan_DOCKER-SCOUT.outputs.image_tag.value }}
          docker images

