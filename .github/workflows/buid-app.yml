name: Upload Python Package

on:
  push: 
    branches: ['main']
  workflow_dispatch: 

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup docker
        uses: docker/setup-docker-action@e43656e248c0bd0647d3f5c195d116aacf6fcaf4
      - name: build container image
        run: |
          docker build -t ayobamiblackforce/guessing-game-ayo:v2 .
      - name: print out docker images
        run: docker images

      # - name: image scanning
      #   uses: snowcittysolutions/scout-action-dev@eb15de5b9247f4800f2c9ac4896bbddeff4defb5
      #   with:
      #     command: cves, quickview
      #     only-severities: critical, high
      #     sarif-file: spdx
      #     output: scout-report.spdx
      #     dockerhub-user: ayobamiblackforce
      #     dockerhub-password: ${{ vars.DOCKERHUB_TOKEN }}

      - name: run app container in background
        run: |
          docker run -d --name guessing-game ayobamiblackforce/guessing-game-ayo:v2

      - name: fetch container address
        run: |
          docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' guessing-game
          docker exec guessing-game hostname -I

          
